services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan
      POSTGRES_PASSWORD: careplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careplan"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://careplan:careplan@db:5432/careplan
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python -m debugpy --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000 --noreload"

  redis:
    image: redis:7

  celery_worker:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://careplan:careplan@db:5432/careplan
      DJANGO_SETTINGS_MODULE: app.settings
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: celery -A app worker --loglevel=info --pool=solo

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus

  test:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://careplan:careplan@db:5432/careplan
      DJANGO_SETTINGS_MODULE: app.settings
      OPENAI_API_KEY: test-dummy-key
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: pytest tests/ -v --cov=app --cov-report=term-missing
    profiles:
      - test

volumes:
  postgres_data:
  grafana_data:
